name: Download

on:
  push: # Isse kisi bhi branch par commit hote hi build apne aap start ho jayega
  pull_request: # Kisi bhi branch ka pull request bante hi chalega

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'adopt'

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Build Slions download variants
      run: ./gradlew assembleSlionsFullDownload

    # APK ko GitHub par save karne ke liye ye step sabse zaroori hai
    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: YouTube-Fulguris-APK
        path: app/build/outputs/apk/**/*.apk
